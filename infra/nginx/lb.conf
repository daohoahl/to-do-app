upstream todo_upstream {
  least_conn;
  server app1:80 max_fails=3 fail_timeout=10s;
  server app2:80 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

map $http_x_canary $use_canary {
  default 0;
  "1"     1;
  "true"  1;
}

split_clients "${remote_addr}${http_user_agent}" $shard_bucket {
  50% app1;
  *   app2;
}

server {
  listen 80;
  server_name _;

  # "Phân dải" (routing partition) example:
  # - If client sends header X-Canary: 1/true => route by hash bucket (sticky-ish)
  # - Otherwise => normal load-balancing
  set $backend "todo_upstream";
  if ($use_canary) {
    set $backend $shard_bucket;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_pass http://$backend;
  }
}
