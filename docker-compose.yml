services:
  app1:
    build:
      context: ./todo
      dockerfile: Dockerfile
    container_name: todo-app-1
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  app2:
    build:
      context: ./todo
      dockerfile: Dockerfile
    container_name: todo-app-2
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  lb:
    image: nginx:alpine
    container_name: todo-lb
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
