name: Custom CI Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  ci-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Check project structure
      run: 
        echo "Checking project structure..."
        ls -la
        ls -la todo

    - name: Validate required files
      run: 
        echo "Validating required files..."
        test -f todo/package.json && echo " package.json OK"
        test -f todo/README.md || echo " README.md missing"

    - name: Run test
      run: 
        echo "Running test..."
        cd todo
        npm install
        npm test || echo "No test script - skip"

    - name: Show final log
      run: echo "CI Pipeline completed successfully!"