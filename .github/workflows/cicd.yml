name: CI/CD (Test + Dockerize + Deploy VM)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "18"
  IMAGE_NAME: "duyhung81002/to-do-app"

jobs:
  ci:
    name: CI (install, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  docker:
    name: Docker (build & push)
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./todo
          file: ./todo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_vm:
    name: Deploy (VM pull & run)
    needs: docker
    runs-on: self-hosted
    if: ${{ secrets.VM_DEPLOY_HOST != '' && secrets.VM_DEPLOY_USER != '' && secrets.VM_DEPLOY_SSH_KEY != '' }}

    steps:
      - name: Deploy on VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_DEPLOY_HOST }}
          username: ${{ secrets.VM_DEPLOY_USER }}
          key: ${{ secrets.VM_DEPLOY_SSH_KEY }}
          port: ${{ secrets.VM_DEPLOY_PORT || 22 }}
          script: |
            set -e
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop to-do-app 2>/dev/null || true
            docker rm to-do-app 2>/dev/null || true
            docker run -d --name to-do-app --restart unless-stopped -p 80:80 ${{ env.IMAGE_NAME }}:latest