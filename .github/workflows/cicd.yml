name: CI/CD (Test + Dockerize + Deploy EC2)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "18"
  IMAGE_NAME: "duyhung81002/to-do-app"

jobs:
  ci:
    name: CI (install, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --watchAll=false

  docker:
    name: Docker (build & push)
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag (commit SHA)
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./todo
          file: ./todo/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_ec2:
    name: Deploy (EC2 via SSM RunCommand)
    needs: docker
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      # Public port for Nginx load balancer on the EC2 host
      APP_PORT: "8080"
      # Optional direct access to app2 on the EC2 host (bypasses Nginx)
      APP2_PORT: "8081"
    steps:
      - name: Validate AWS + SSM config
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ] || [ -z "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "Skip deploy_ec2: missing AWS_REGION / AWS_ROLE_TO_ASSUME (use GitHub Variables)."
            exit 0
          fi

          # Default to your provided instance id if the variable is not set.
          echo "INSTANCE_ID=${EC2_INSTANCE_ID:-i-07a5883d82c5cfed8}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Deploy on EC2 (SSM RunCommand)
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          echo "Deploy target instance: ${INSTANCE_ID}"
          image_tag="${{ needs.docker.outputs.image_tag }}"
          export IMAGE_TAG="$image_tag"

          params="$(python - <<'PY'
          import json, os
          image = os.environ["IMAGE_NAME"]
          tag = os.environ["IMAGE_TAG"]
          lb_port = os.environ.get("APP_PORT", "8080")
          app2_port = os.environ.get("APP2_PORT", "8081")
          cmds = [
            # SSM's AWS-RunShellScript uses /bin/sh by default; avoid bash-only options like 'pipefail'.
            "set -eux",
            # Shared docker network for app + monitoring
            "docker network create todo-net 2>/dev/null || true",

            # App images
            f"docker pull {image}:{tag}",

            # Cleanup legacy single-container deployment (if it exists)
            "docker stop to-do-app 2>/dev/null || true",
            "docker rm to-do-app 2>/dev/null || true",

            # Two app instances behind Nginx LB
            "docker stop app1 2>/dev/null || true",
            "docker rm app1 2>/dev/null || true",
            f"docker run -d --name app1 --restart unless-stopped --network todo-net {image}:{tag}",

            "docker stop app2 2>/dev/null || true",
            "docker rm app2 2>/dev/null || true",
            f"docker run -d --name app2 --restart unless-stopped --network todo-net -p {app2_port}:80 {image}:{tag}",

            # Nginx load balancer (ports are published from the EC2 host)
            "mkdir -p /opt/todo-lb",
            "cat > /opt/todo-lb/lb.conf <<'EOF'\n"
            "upstream todo_upstream {\n"
            "  least_conn;\n"
            "  server app1:80 max_fails=3 fail_timeout=10s;\n"
            "  server app2:80 max_fails=3 fail_timeout=10s;\n"
            "  keepalive 32;\n"
            "}\n"
            "\n"
            "map $http_x_canary $use_canary {\n"
            "  default 0;\n"
            "  \"1\"     1;\n"
            "  \"true\"  1;\n"
            "}\n"
            "\n"
            "split_clients \"${remote_addr}${http_user_agent}\" $shard_bucket {\n"
            "  50% app1;\n"
            "  *   app2;\n"
            "}\n"
            "\n"
            "server {\n"
            "  listen 80;\n"
            "  server_name _;\n"
            "  set $backend \"todo_upstream\";\n"
            "  if ($use_canary) {\n"
            "    set $backend $shard_bucket;\n"
            "  }\n"
            "\n"
            "  location / {\n"
            "    proxy_http_version 1.1;\n"
            "    proxy_set_header Connection \"\";\n"
            "    proxy_set_header Host $host;\n"
            "    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n"
            "    proxy_set_header X-Forwarded-Proto $scheme;\n"
            "\n"
            "    proxy_next_upstream error timeout http_502 http_503 http_504;\n"
            "    proxy_pass http://$backend;\n"
            "  }\n"
            "}\n"
            "EOF",

            "docker pull nginx:alpine",
            "docker stop todo-lb 2>/dev/null || true",
            "docker rm todo-lb 2>/dev/null || true",
            f"docker run -d --name todo-lb --restart unless-stopped --network todo-net -p {lb_port}:80 -v /opt/todo-lb/lb.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine",

            # Monitoring 
            # node_exporter: host metrics
            "docker pull prom/node-exporter:v1.9.1",
            "docker stop node-exporter 2>/dev/null || true",
            "docker rm node-exporter 2>/dev/null || true",
            (
              "docker run -d --name node-exporter --restart unless-stopped --network todo-net "
              "--pid=host -p 9100:9100 "
              "-v /proc:/host/proc:ro -v /sys:/host/sys:ro -v /:/rootfs:ro "
              "prom/node-exporter:v1.9.1 "
              "--path.procfs=/host/proc --path.sysfs=/host/sys --path.rootfs=/rootfs"
            ),

            # cAdvisor: container metrics
            "docker pull gcr.io/cadvisor/cadvisor:v0.49.1",
            "docker stop cadvisor 2>/dev/null || true",
            "docker rm cadvisor 2>/dev/null || true",
            (
              "docker run -d --name cadvisor --restart unless-stopped --network todo-net "
              "-p 8089:8080 "
              "--privileged "
              "-v /:/rootfs:ro -v /var/run:/var/run:rw -v /sys:/sys:ro -v /var/lib/docker/:/var/lib/docker:ro "
              "gcr.io/cadvisor/cadvisor:v0.49.1"
            ),

            # Prometheus config
            "mkdir -p /opt/todo-monitoring/prometheus",
            "cat > /opt/todo-monitoring/prometheus/prometheus.yml <<'EOF'\n"
            "global:\n"
            "  scrape_interval: 10s\n"
            "\n"
            "scrape_configs:\n"
            "  - job_name: prometheus\n"
            "    static_configs:\n"
            "      - targets: ['localhost:9090']\n"
            "\n"
            "  - job_name: node_exporter\n"
            "    static_configs:\n"
            "      - targets: ['node-exporter:9100']\n"
            "\n"
            "  - job_name: cadvisor\n"
            "    static_configs:\n"
            "      - targets: ['cadvisor:8080']\n"
            "EOF",

            "docker pull prom/prometheus:v3.5.0",
            "docker stop prometheus 2>/dev/null || true",
            "docker rm prometheus 2>/dev/null || true",
            (
              "docker run -d --name prometheus --restart unless-stopped --network todo-net "
              "-p 9090:9090 "
              "-v /opt/todo-monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro "
              "prom/prometheus:v3.5.0 --config.file=/etc/prometheus/prometheus.yml"
            ),

            # Grafana (basic, no provisioning)
            "docker pull grafana/grafana:11.6.0",
            "docker stop grafana 2>/dev/null || true",
            "docker rm grafana 2>/dev/null || true",
            (
              "docker run -d --name grafana --restart unless-stopped --network todo-net "
              "-p 3000:3000 "
              "-e GF_SECURITY_ADMIN_USER=admin "
              "-e GF_SECURITY_ADMIN_PASSWORD=admin "
              "-e GF_USERS_ALLOW_SIGN_UP=false "
              "grafana/grafana:11.6.0"
            ),

            "code='000'",
            f"for i in $(seq 1 15); do code=$(curl -sS -o /dev/null -m 3 -w '%{{http_code}}' http://localhost:{lb_port}/ || true); echo \"try=$i HTTP_STATUS=$code\"; if [ \"$code\" = \"200\" ]; then break; fi; sleep 2; done",
            "test \"$code\" = \"200\"",
          ]
          print(json.dumps({"commands": cmds}))
          PY
          )"

          cmd_id="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy to-do-app container" \
            --instance-ids "${INSTANCE_ID}" \
            --parameters "$params" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM_COMMAND_ID=$cmd_id" >> "$GITHUB_ENV"
          echo "SSM CommandId=$cmd_id"

      - name: Wait for SSM command result
        shell: bash
        run: |
          set -euo pipefail

          cmd_id="${SSM_COMMAND_ID:?missing}"
          inst="${INSTANCE_ID:?missing}"

          status="Pending"
          for i in $(seq 1 60); do
            status="$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "$inst" \
              --query "Status" \
              --output text || true)"

            echo "poll=$i status=$status"

            case "$status" in
              Success)
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "== SSM command output (stdout) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardOutputContent" --output text || true
                echo "== SSM command output (stderr) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardErrorContent" --output text || true
                exit 1
                ;;
              Pending|InProgress|Delayed)
                sleep 5
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          echo "Timeout waiting for SSM command to complete."
          exit 1
