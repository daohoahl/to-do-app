name: CI/CD (Test + Dockerize + Deploy EC2)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "18"
  IMAGE_NAME: "duyhung81002/to-do-app"

jobs:
  ci:
    name: CI (install, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --watchAll=false

  docker:
    name: Docker (build & push)
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag (commit SHA)
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./todo
          file: ./todo/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_ec2:
    name: Deploy (EC2)
    needs: docker
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      APP_PORT: "8080"
      APP2_PORT: "8081"
    steps:
      - name: Validate AWS + SSM config
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ] || [ -z "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "Skip deploy_ec2: missing AWS_REGION / AWS_ROLE_TO_ASSUME (use GitHub Variables)."
            exit 0
          fi

          # Default to your provided instance id if the variable is not set.
          echo "INSTANCE_ID=${EC2_INSTANCE_ID:-i-07a5883d82c5cfed8}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Deploy on EC2 (SSM RunCommand)
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          echo "Deploy target instance: ${INSTANCE_ID}"
          image_tag="${{ needs.docker.outputs.image_tag }}"
          export IMAGE_TAG="$image_tag"

          params="$(python - <<'PY'
          import json, os
          image = os.environ["IMAGE_NAME"]
          tag = os.environ["IMAGE_TAG"]
          stable_tag = os.environ.get("STABLE_TAG", "stable")
          lb_port = os.environ.get("APP_PORT", "8080")
          app2_port = os.environ.get("APP2_PORT", "8081")
          telemetry_port = os.environ.get("TELEMETRY_PORT", "7070")
          cmds = [
            # SSM's AWS-RunShellScript uses /bin/sh by default; avoid bash-only options like 'pipefail'.
            "set -eux",
            # Shared docker network for app + monitoring
            "docker network create todo-net 2>/dev/null || true",

            # App images (current and stable backup)
            f"docker pull {image}:{tag}",
            f"docker pull {image}:{stable_tag} || true",

            # Cleanup container deployment (if it exists)
            "docker stop to-do-app 2>/dev/null || true",
            "docker rm to-do-app 2>/dev/null || true",

            # Two app instances behind Nginx LB
            "docker stop app1 2>/dev/null || true",
            "docker rm app1 2>/dev/null || true",
            f"docker run -d --name app1 --restart unless-stopped --network todo-net {image}:{tag}",

            "docker stop app2 2>/dev/null || true",
            "docker rm app2 2>/dev/null || true",
            f"docker run -d --name app2 --restart unless-stopped --network todo-net -p {app2_port}:80 {image}:{tag}",

            # Telemetry service: collect raw web interactions and expose /stats.json (JSON)
            "mkdir -p /opt/todo-telemetry",
            "cat > /opt/todo-telemetry/server.mjs <<'EOF'\n"
            "import http from 'http';\n"
            "import { appendFileSync, existsSync, mkdirSync, readFileSync } from 'fs';\n"
            "import { dirname } from 'path';\n"
            "\n"
            "const PORT = Number(process.env.PORT || 7070);\n"
            "const DATA_FILE = process.env.DATA_FILE || '/data/events.jsonl';\n"
            "const NGINX_ACCESS_LOG = process.env.NGINX_ACCESS_LOG || '/logs/access.jsonl';\n"
            "const MAX_EVENTS = Number(process.env.MAX_EVENTS || 200);\n"
            "const MAX_LOG_LINES = Number(process.env.MAX_LOG_LINES || 5000);\n"
            "\n"
            "function ensureDir(p) {\n"
            "  const d = dirname(p);\n"
            "  if (!existsSync(d)) mkdirSync(d, { recursive: true });\n"
            "}\n"
            "\n"
            "ensureDir(DATA_FILE);\n"
            "\n"
            "let events = [];\n"
            "let countsByType = {};\n"
            "let total = 0;\n"
            "let traffic = { total: 0, byStatus: {}, topPaths: [] };\n"
            "\n"
            "function record(ev) {\n"
            "  total += 1;\n"
            "  const type = String(ev.type || 'unknown');\n"
            "  countsByType[type] = (countsByType[type] || 0) + 1;\n"
            "  events.push(ev);\n"
            "  if (events.length > MAX_EVENTS) events = events.slice(-MAX_EVENTS);\n"
            "}\n"
            "\n"
            "try {\n"
            "  if (existsSync(DATA_FILE)) {\n"
            "    const lines = readFileSync(DATA_FILE, 'utf8').trim().split('\\n').filter(Boolean);\n"
            "    for (const line of lines.slice(-MAX_EVENTS)) {\n"
            "      try { record(JSON.parse(line)); } catch {}\n"
            "    }\n"
            "  }\n"
            "} catch {}\n"
            "\n"
            "function computeTraffic() {\n"
            "  try {\n"
            "    if (!existsSync(NGINX_ACCESS_LOG)) {\n"
            "      traffic = { total: 0, byStatus: {}, topPaths: [] };\n"
            "      return;\n"
            "    }\n"
            "    const raw = readFileSync(NGINX_ACCESS_LOG, 'utf8');\n"
            "    const lines = raw.trim().split('\\n').filter(Boolean).slice(-MAX_LOG_LINES);\n"
            "    let totalReq = 0;\n"
            "    const byStatus = {};\n"
            "    const byPath = {};\n"
            "    for (const line of lines) {\n"
            "      let obj;\n"
            "      try { obj = JSON.parse(line); } catch { continue; }\n"
            "      totalReq += 1;\n"
            "      const s = String(obj.status || '');\n"
            "      if (s) byStatus[s] = (byStatus[s] || 0) + 1;\n"
            "      const p = String(obj.uri || obj.path || '/');\n"
            "      byPath[p] = (byPath[p] || 0) + 1;\n"
            "    }\n"
            "    const topPaths = Object.entries(byPath)\n"
            "      .sort((a, b) => b[1] - a[1])\n"
            "      .slice(0, 10)\n"
            "      .map(([path, count]) => ({ path, count }));\n"
            "    traffic = { total: totalReq, byStatus, topPaths };\n"
            "  } catch {\n"
            "    traffic = { total: 0, byStatus: {}, topPaths: [] };\n"
            "  }\n"
            "}\n"
            "\n"
            "function sendJson(res, code, obj) {\n"
            "  const body = JSON.stringify(obj, null, 2);\n"
            "  res.writeHead(code, {\n"
            "    'Content-Type': 'application/json; charset=utf-8',\n"
            "    'Cache-Control': 'no-store'\n"
            "  });\n"
            "  res.end(body);\n"
            "}\n"
            "\n"
            "const server = http.createServer((req, res) => {\n"
            "  const url = new URL(req.url || '/', 'http://localhost');\n"
            "\n"
            "  if (req.method === 'GET' && url.pathname === '/stats.json') {\n"
            "    computeTraffic();\n"
            "    return sendJson(res, 200, {\n"
            "      ok: true,\n"
            "      now: Date.now(),\n"
            "      totalEvents: total,\n"
            "      countsByType,\n"
            "      lastEvents: events.slice(-50),\n"
            "      traffic: {\n"
            "        totalRequestsObserved: traffic.total,\n"
            "        byStatus: traffic.byStatus,\n"
            "        topPaths: traffic.topPaths\n"
            "      }\n"
            "    });\n"
            "  }\n"
            "\n"
            "  if (req.method === 'POST' && url.pathname === '/telemetry/event') {\n"
            "    let raw = '';\n"
            "    req.on('data', (c) => {\n"
            "      raw += c;\n"
            "      if (raw.length > 1024 * 64) req.destroy();\n"
            "    });\n"
            "    req.on('end', () => {\n"
            "      try {\n"
            "        const ev = JSON.parse(raw || '{}');\n"
            "        const safe = {\n"
            "          ts: Number(ev.ts || Date.now()),\n"
            "          type: String(ev.type || 'unknown'),\n"
            "          value: String(ev.value || ''),\n"
            "          todoId: ev.todoId ?? null,\n"
            "          path: String(ev.path || ''),\n"
            "          ua: String(ev.ua || ''),\n"
            "          ip: String(req.headers['x-forwarded-for'] || req.socket.remoteAddress || '')\n"
            "        };\n"
            "        appendFileSync(DATA_FILE, JSON.stringify(safe) + '\\n');\n"
            "        record(safe);\n"
            "        return sendJson(res, 200, { ok: true });\n"
            "      } catch {\n"
            "        return sendJson(res, 400, { ok: false });\n"
            "      }\n"
            "    });\n"
            "    return;\n"
            "  }\n"
            "\n"
            "  res.writeHead(404, { 'Content-Type': 'text/plain; charset=utf-8' });\n"
            "  res.end('not found');\n"
            "});\n"
            "\n"
            "server.listen(PORT, '0.0.0.0', () => {\n"
            "  console.log(`telemetry listening on :${PORT}`);\n"
            "});\n"
            "EOF",
            "docker pull node:18-alpine",
            "docker stop todo-telemetry 2>/dev/null || true",
            "docker rm todo-telemetry 2>/dev/null || true",
            # /opt/todo-lb/logs is mounted later; allow telemetry to read it for traffic stats.
            f"docker run -d --name todo-telemetry --restart unless-stopped --network todo-net -e PORT={telemetry_port} -e DATA_FILE=/data/events.jsonl -e NGINX_ACCESS_LOG=/logs/access.jsonl -v /opt/todo-telemetry:/data -v /opt/todo-lb/logs:/logs:ro node:18-alpine node /data/server.mjs",

            # Nginx load balancer 
            "mkdir -p /opt/todo-lb",
            "mkdir -p /opt/todo-lb/logs",
            "cat > /opt/todo-lb/lb.conf <<'EOF'\n"
            "log_format json escape=json '{\"ts\":\"$time_iso8601\",\"remote_addr\":\"$remote_addr\",\"x_forwarded_for\":\"$http_x_forwarded_for\",\"method\":\"$request_method\",\"uri\":\"$uri\",\"status\":$status,\"bytes\":$body_bytes_sent,\"request_time\":$request_time,\"upstream\":\"$upstream_addr\",\"upstream_status\":\"$upstream_status\",\"upstream_time\":\"$upstream_response_time\",\"user_agent\":\"$http_user_agent\"}';\n"
            "\n"
            "upstream todo_upstream {\n"
            "  least_conn;\n"
            "  server app1:80 max_fails=3 fail_timeout=10s;\n"
            "  server app2:80 max_fails=3 fail_timeout=10s;\n"
            "  keepalive 32;\n"
            "}\n"
            "\n"
            "upstream telemetry_upstream {\n"
            "  server todo-telemetry:7070;\n"
            "  keepalive 8;\n"
            "}\n"
            "\n"
            "map $http_x_canary $use_canary {\n"
            "  default 0;\n"
            "  \"1\"     1;\n"
            "  \"true\"  1;\n"
            "}\n"
            "\n"
            "split_clients \"${remote_addr}${http_user_agent}\" $shard_bucket {\n"
            "  50% app1;\n"
            "  *   app2;\n"
            "}\n"
            "\n"
            "server {\n"
            "  listen 80;\n"
            "  server_name _;\n"
            "  access_log /var/log/nginx/access.jsonl json;\n"
            "  error_log /var/log/nginx/error.log warn;\n"
            "  set $backend \"todo_upstream\";\n"
            "  if ($use_canary) {\n"
            "    set $backend $shard_bucket;\n"
            "  }\n"
            "\n"
            "  location / {\n"
            "    proxy_http_version 1.1;\n"
            "    proxy_set_header Connection \"\";\n"
            "    proxy_set_header Host $host;\n"
            "    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n"
            "    proxy_set_header X-Forwarded-Proto $scheme;\n"
            "\n"
            "    proxy_next_upstream error timeout http_502 http_503 http_504;\n"
            "    proxy_pass http://$backend;\n"
            "  }\n"
            "\n"
            "  location = /stats.json {\n"
            "    proxy_pass http://telemetry_upstream/stats.json;\n"
            "  }\n"
            "\n"
            "  location = /telemetry/event {\n"
            "    proxy_pass http://telemetry_upstream/telemetry/event;\n"
            "  }\n"
            "}\n"
            "EOF",

            "docker pull nginx:alpine",
            "docker stop todo-lb 2>/dev/null || true",
            "docker rm todo-lb 2>/dev/null || true",
            f"docker run -d --name todo-lb --restart unless-stopped --network todo-net -p {lb_port}:80 -v /opt/todo-lb/lb.conf:/etc/nginx/conf.d/default.conf:ro -v /opt/todo-lb/logs:/var/log/nginx nginx:alpine",

            "code='000'",
            f"for i in $(seq 1 15); do code=$(curl -sS -o /dev/null -m 3 -w '%{{http_code}}' http://localhost:{lb_port}/ || true); echo \"try=$i HTTP_STATUS=$code\"; if [ \"$code\" = \"200\" ]; then break; fi; sleep 2; done",
            # If healthcheck fails, roll back containers to the last known good image tag (stable).
            "if [ \"$code\" != \"200\" ]; then "
            "  echo 'Healthcheck failed, rolling back to stable image'; "
            f"  docker pull {image}:{stable_tag} || true; "
            "  docker stop app1 app2 todo-lb todo-telemetry 2>/dev/null || true; "
            "  docker rm app1 app2 todo-lb todo-telemetry 2>/dev/null || true; "
            f"  docker run -d --name app1 --restart unless-stopped --network todo-net {image}:{stable_tag}; "
            f"  docker run -d --name app2 --restart unless-stopped --network todo-net -p {app2_port}:80 {image}:{stable_tag}; "
            f"  docker run -d --name todo-telemetry --restart unless-stopped --network todo-net -e PORT={telemetry_port} -e DATA_FILE=/data/events.jsonl -e NGINX_ACCESS_LOG=/logs/access.jsonl -v /opt/todo-telemetry:/data -v /opt/todo-lb/logs:/logs:ro node:18-alpine node /data/server.mjs; "
            f"  docker run -d --name todo-lb --restart unless-stopped --network todo-net -p {lb_port}:80 -v /opt/todo-lb/lb.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine; "
            "  exit 1; "
            "fi",
          ]
          print(json.dumps({"commands": cmds}))
          PY
          )"

          cmd_id="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy to-do-app container" \
            --instance-ids "${INSTANCE_ID}" \
            --parameters "$params" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM_COMMAND_ID=$cmd_id" >> "$GITHUB_ENV"
          echo "SSM CommandId=$cmd_id"

      - name: Wait for SSM command result
        shell: bash
        run: |
          set -euo pipefail

          cmd_id="${SSM_COMMAND_ID:?missing}"
          inst="${INSTANCE_ID:?missing}"

          status="Pending"
          for i in $(seq 1 60); do
            status="$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "$inst" \
              --query "Status" \
              --output text || true)"

            echo "poll=$i status=$status"

            case "$status" in
              Success)
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "== SSM command output (stdout) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardOutputContent" --output text || true
                echo "== SSM command output (stderr) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardErrorContent" --output text || true
                exit 1
                ;;
              Pending|InProgress|Delayed)
                sleep 5
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          echo "Timeout waiting for SSM command to complete."
          exit 1

      - name: Login to Docker Hub for stable tag
        if: ${{ success() }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote image to stable on success
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}"
          tag="${{ needs.docker.outputs.image_tag }}"
          docker pull "$image:$tag"
          docker tag "$image:$tag" "$image:stable"
          docker push "$image:stable"
