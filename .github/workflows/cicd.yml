name: CI/CD (Test + Dockerize + Deploy VM)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "18"
  IMAGE_NAME: "duyhung81002/to-do-app"

jobs:
  ci:
    name: CI (install, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  docker:
    name: Docker (build & push)
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch
            type=raw,value=run-${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./todo
          file: ./todo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_vm:
    name: Deploy (VM pull & run)
    needs: docker
    runs-on: self-hosted
    env:
      VM_DEPLOY_HOST: ${{ secrets.VM_DEPLOY_HOST }}
      VM_DEPLOY_USER: ${{ secrets.VM_DEPLOY_USER }}
      VM_DEPLOY_SSH_KEY: ${{ secrets.VM_DEPLOY_SSH_KEY }}

    steps:
      - name: Validate deploy configuration (secrets)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VM_DEPLOY_HOST:-}" ] || [ -z "${VM_DEPLOY_USER:-}" ] || [ -z "${VM_DEPLOY_SSH_KEY:-}" ]; then
            echo "Skip deploy_vm: missing one of VM_DEPLOY_HOST / VM_DEPLOY_USER / VM_DEPLOY_SSH_KEY"
            exit 0
          fi

          # appleboy/ssh-action expects a PRIVATE key (not .pub) in OpenSSH/PEM format.
          if ! printf '%s' "$VM_DEPLOY_SSH_KEY" | grep -qE 'BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY'; then
            echo "VM_DEPLOY_SSH_KEY looks invalid (not a private key block)."
            echo "Paste the full private key content starting with '-----BEGIN ... PRIVATE KEY-----' into the secret."
            exit 1
          fi

          echo "Deploy target: ${VM_DEPLOY_USER}@${VM_DEPLOY_HOST}"

      - name: Deploy on VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_DEPLOY_HOST }}
          username: ${{ env.VM_DEPLOY_USER }}
          key: ${{ env.VM_DEPLOY_SSH_KEY }}
          script: |
            set -euxo pipefail
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop to-do-app 2>/dev/null || true
            docker rm to-do-app 2>/dev/null || true
            docker run -d --name to-do-app --restart unless-stopped -p 8080:80 ${{ env.IMAGE_NAME }}:latest

            echo "== Verify container is running =="
            docker ps --filter "name=to-do-app" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "== Verify HTTP (localhost) =="
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)"
            echo "HTTP_STATUS=$code"
            if [ "$code" != "200" ]; then
              echo "Deploy check failed (expected 200)."
              exit 1
            fi
