name: CI/CD (Test + Dockerize + Deploy EC2)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "18"
  IMAGE_NAME: "duyhung81002/to-do-app"

jobs:
  ci:
    name: CI (install, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --watchAll=false

      - name: Build
        run: npm run build

  docker:
    name: Docker (build & push)
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./todo
          file: ./todo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_ec2:
    name: Deploy (EC2 via SSM RunCommand)
    needs: docker
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      APP_PORT: "8080"
    steps:
      - name: Validate AWS + SSM config
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ] || [ -z "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "Skip deploy_ec2: missing AWS_REGION / AWS_ROLE_TO_ASSUME (use GitHub Variables)."
            exit 0
          fi

          # Default to your provided instance id if the variable is not set.
          echo "INSTANCE_ID=${EC2_INSTANCE_ID:-i-07a5883d82c5cfed8}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Deploy on EC2 (SSM RunCommand)
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          echo "Deploy target instance: ${INSTANCE_ID}"

          cmd_id="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy to-do-app container" \
            --instance-ids "${INSTANCE_ID}" \
            --parameters commands="set -euxo pipefail
          docker pull '${IMAGE_NAME}:latest'
          docker stop to-do-app 2>/dev/null || true
          docker rm to-do-app 2>/dev/null || true
          docker run -d --name to-do-app --restart unless-stopped -p ${APP_PORT}:80 '${IMAGE_NAME}:latest'
          code='000'
          for i in \$(seq 1 15); do
            code=\$(curl -sS -o /dev/null -m 3 -w '%{http_code}' http://localhost:${APP_PORT}/ || true)
            echo \"try=\$i HTTP_STATUS=\$code\"
            if [ \"\$code\" = \"200\" ]; then break; fi
            sleep 2
          done
          test \"\$code\" = \"200\"" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM_COMMAND_ID=$cmd_id" >> "$GITHUB_ENV"
          echo "SSM CommandId=$cmd_id"

      - name: Wait for SSM command result
        shell: bash
        run: |
          set -euo pipefail

          cmd_id="${SSM_COMMAND_ID:?missing}"
          inst="${INSTANCE_ID:?missing}"

          status="Pending"
          for i in $(seq 1 60); do
            status="$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "$inst" \
              --query "Status" \
              --output text || true)"

            echo "poll=$i status=$status"

            case "$status" in
              Success)
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "== SSM command output (stdout) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardOutputContent" --output text || true
                echo "== SSM command output (stderr) =="
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$inst" --query "StandardErrorContent" --output text || true
                exit 1
                ;;
              Pending|InProgress|Delayed)
                sleep 5
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          echo "Timeout waiting for SSM command to complete."
          exit 1
